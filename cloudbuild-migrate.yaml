# Cloud Build job that reconciles the Drizzle schema against Cloud SQL.
#
# Uses `drizzle-kit push` (not `migrate`) because this database was originally
# created by Prisma: tables already exist but Drizzle's migration tracker
# (__drizzle_migrations) is empty, so `migrate` would fail on CREATE TABLE.
# `push` introspects the live DB, diffs against drizzle/schema/* and applies
# only what's missing. `--force` skips interactive prompts; `--verbose` logs
# every statement.
#
# Usage:
#   export PROJECT_ID=your-project-id
#   export REGION=us-central1
#   export DB_INSTANCE=alphalead-db
#   export DB_SECRET=database-url
#
#   gcloud builds submit --config cloudbuild-migrate.yaml \
#     --substitutions=_REGION=$REGION,_DB_INSTANCE=$DB_INSTANCE,_DB_SECRET=$DB_SECRET

steps:
  # Start the Cloud SQL Auth Proxy in the background, wait for it to be ready,
  # then reconcile the schema with drizzle-kit push.
  #
  # The DATABASE_URL secret is stored in Cloud Run socket format
  # (postgresql://user:pass@/db?host=/cloudsql/project:region:instance).
  # The Cloud SQL proxy exposes the instance on 127.0.0.1:5432, so we
  # rewrite the URL to point at localhost before running drizzle-kit.
  - name: "node:20-alpine"
    entrypoint: sh
    args:
      - -c
      - |
        apk add --no-cache wget postgresql-client
        wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64 -O /cloud-sql-proxy
        chmod +x /cloud-sql-proxy
        /cloud-sql-proxy --structured-logs --port=5432 "${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}" &
        PROXY_PID=$!
        echo "Waiting for Cloud SQL proxy..."
        sleep 8
        export DATABASE_URL="$$(echo "$$DATABASE_URL" | sed -E 's|@/|@localhost:5432/|; s|\?.*||')"
        echo "DATABASE_URL host: $$(echo "$$DATABASE_URL" | sed -E 's|.*@([^/:]+).*|\1|')"
        # Install pgvector before drizzle-kit push, otherwise the `vector(768)`
        # column on KnowledgeChunk would error on type creation.
        export PGPASSWORD="$$(echo "$$DATABASE_URL" | sed -nE 's|.*:([^@]+)@.*|\1|p')"
        psql -h 127.0.0.1 -U "$$(echo "$$DATABASE_URL" | sed -nE 's|.*//([^:]+):.*|\1|p')" -d "$$(echo "$$DATABASE_URL" | sed -nE 's|.*/([^/?]+)(\?.*)?$$|\1|p')" -c "CREATE EXTENSION IF NOT EXISTS vector;"
        npm ci --ignore-scripts
        npx drizzle-kit push --force --verbose
        PUSH_STATUS=$?
        psql -h 127.0.0.1 -U "$$(echo "$$DATABASE_URL" | sed -nE 's|.*//([^:]+):.*|\1|p')" -d "$$(echo "$$DATABASE_URL" | sed -nE 's|.*/([^/?]+)(\?.*)?$$|\1|p')" -c "CREATE INDEX IF NOT EXISTS \"KnowledgeChunk_embedding_ivfflat_idx\" ON \"KnowledgeChunk\" USING ivfflat (embedding vector_cosine_ops) WITH (lists = 100);"
        psql -h 127.0.0.1 -U "$$(echo "$$DATABASE_URL" | sed -nE 's|.*//([^:]+):.*|\1|p')" -d "$$(echo "$$DATABASE_URL" | sed -nE 's|.*/([^/?]+)(\?.*)?$$|\1|p')" -f scripts/fts.sql
        # Set DEFAULT now() on every "updatedAt" column (see scripts header).
        # Idempotent.
        psql -h 127.0.0.1 -U "$$(echo "$$DATABASE_URL" | sed -nE 's|.*//([^:]+):.*|\1|p')" -d "$$(echo "$$DATABASE_URL" | sed -nE 's|.*/([^/?]+)(\?.*)?$$|\1|p')" -f scripts/set_updatedat_defaults.sql
        kill $$PROXY_PID || true
        exit $$PUSH_STATUS
    secretEnv: ["DATABASE_URL"]

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/${_DB_SECRET}/versions/latest
      env: DATABASE_URL

substitutions:
  _REGION: us-central1
  _DB_INSTANCE: alphalead-db
  _DB_SECRET: database-url

options:
  logging: CLOUD_LOGGING_ONLY
