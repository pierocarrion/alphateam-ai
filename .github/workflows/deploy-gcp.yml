name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/871583157548/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-cicd@alphalead-ai.iam.gserviceaccount.com
          project_id: alphalead-ai

      - uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build
        run: |
          set -x
          gcloud config set project alphalead-ai
          gcloud auth list
          gcloud builds submit . \
            --config=cloudbuild.yaml \
            --project=alphalead-ai \
            --substitutions=_VERSION=${{ github.sha }}
