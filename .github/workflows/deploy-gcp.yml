name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/871583157548/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-cicd@alphalead-ai.iam.gserviceaccount.com
          project_id: alphalead-ai

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload source and submit build
        run: |
          set +e
          gcloud config set project alphalead-ai
          echo "=== Creating source tarball ==="
          tar -czf /tmp/source.tar.gz .
          echo "=== Uploading to GCS ==="
          UPLOAD_OUT=$(gsutil cp /tmp/source.tar.gz gs://alphalead-ai-build-source/source-$GITHUB_SHA.tar.gz 2>&1)
          UPLOAD_STATUS=$?
          echo "$UPLOAD_OUT"
          if [ $UPLOAD_STATUS -ne 0 ]; then
            echo "::error::GCS upload failed (exit $UPLOAD_STATUS): $UPLOAD_OUT"
            exit 1
          fi
          echo "=== Submitting Cloud Build ==="
          OUTPUT=$(gcloud builds submit \
            --source gs://alphalead-ai-build-source/source-$GITHUB_SHA.tar.gz \
            --config=cloudbuild.yaml \
            --project=alphalead-ai \
            --substitutions=_VERSION=$GITHUB_SHA 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            MSG=$(echo "$OUTPUT" | tail -15 | tr '\n' ' ' | sed 's/|/ /g')
            echo "::error::Build submit failed (exit $STATUS): $MSG"
            exit 1
          fi
