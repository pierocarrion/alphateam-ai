name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/871583157548/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-cicd@alphalead-ai.iam.gserviceaccount.com
          project_id: alphalead-ai

      - uses: google-github-actions/setup-gcloud@v2

      - name: Diagnostics
        run: |
          set +e
          AUTH_OUT=$(gcloud auth list 2>&1)
          GCS_OUT=$(gsutil ls gs://alphalead-ai-build-source 2>&1)
          GCS_STATUS=$?
          ACCT=$(gcloud auth list --filter=status:ACTIVE --format="value(account)" 2>&1)
          echo "::warning::AUTH: $AUTH_OUT | ACCT: $ACCT | GCS_STATUS: $GCS_STATUS | GCS_OUT: $GCS_OUT"
          if [ $GCS_STATUS -ne 0 ]; then
            echo "::error::GCS access failed: $GCS_OUT"
          fi

      - name: Submit Cloud Build
        run: |
          set +e
          gcloud config set project alphalead-ai
          OUTPUT=$(gcloud builds submit . \
            --config=cloudbuild.yaml \
            --project=alphalead-ai \
            --gcs-source-staging-dir=gs://alphalead-ai-build-source/source \
            --substitutions=_VERSION=${{ github.sha }} 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            MSG=$(echo "$OUTPUT" | tail -15 | tr '\n' ' ' | sed 's/|/ /g')
            echo "::error::Build submit failed (exit $STATUS): $MSG"
            exit 1
          fi
