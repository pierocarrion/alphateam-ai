services:
  postgres:
    image: postgres:16-alpine
    container_name: alphateam-ai-postgres
    environment:
      POSTGRES_USER: alphateam-ai
      POSTGRES_PASSWORD: alphateam-ai
      POSTGRES_DB: alphateam-ai
    ports:
      - "5432:5432"
    volumes:
      - alphateam-ai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphateam-ai -d alphateam-ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: alphateam-ai-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://alphateam-ai:alphateam-ai@postgres:5432/alphateam-ai?schema=public"
      NEXTAUTH_SECRET: "local-dev-secret-change-me-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: alphateam-ai
      DB_NAME: alphateam-ai
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  alphateam-ai_pg_data:
