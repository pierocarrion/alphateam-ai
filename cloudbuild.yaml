steps:
  # Run Prisma migrations against Cloud SQL before deploying.
  # This ensures the database schema is up to date so requests don't hit
  # Prisma P2021 ("table does not exist") errors at runtime.
  #
  # The DATABASE_URL secret is stored in Cloud Run socket format
  # (postgresql://user:pass@/db?host=/cloudsql/project:region:instance).
  # The Cloud SQL proxy exposes the instance on 127.0.0.1:5432, so we
  # rewrite the URL to point at localhost before running Prisma.
  - name: "node:20-alpine"
    entrypoint: sh
    args:
      - -c
      - |
        apk add --no-cache wget postgresql-client
        wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64 -O /cloud-sql-proxy
        chmod +x /cloud-sql-proxy
        /cloud-sql-proxy --structured-logs --port=5432 "${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}" &
        PROXY_PID=$!
        echo "Waiting for Cloud SQL proxy..."
        sleep 8
        # Rewrite DATABASE_URL: replace socket-path host with localhost:5432
        # Handles: postgresql://user:pass@/db?host=/cloudsql/...  ->  ...@localhost:5432/db
        export DATABASE_URL="$$(echo "$$DATABASE_URL" | sed -E 's|@/|@localhost:5432/|; s|\?.*||; s|$$|?schema=public|')"
        echo "DATABASE_URL host: $$(echo "$$DATABASE_URL" | sed -E 's|.*@([^/:]+).*|\1|')"
        npm ci --ignore-scripts
        npx prisma migrate deploy
        MIGRATE_STATUS=$?
        kill $$PROXY_PID || true
        exit $$MIGRATE_STATUS
    secretEnv: ["DATABASE_URL"]

  # Pull the previously pushed image so docker can reuse its layers as cache
  # (the legacy docker builder in Cloud Build does not support BuildKit
  # --cache-from/--cache-to registry syntax). Allowed to fail on first deploy
  # when no image exists yet.
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: bash
    args:
      - -c
      - |
        docker pull "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest" || true

  # Build the container image, reusing layers from the pulled image. The
  # `npm ci` + `prisma generate` layers are reused whenever package-lock.json
  # is unchanged, so only source-level changes re-trigger `next build`.
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "--cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_VERSION}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}"
      - "--all-tags"

  # Deploy the image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_VERSION}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - managed
      - "--allow-unauthenticated"
      - "--service-account"
      - "${_SERVICE_ACCOUNT}"
      - "--set-secrets"
      - "DATABASE_URL=${_DB_SECRET}:latest,NEXTAUTH_SECRET=${_AUTH_SECRET}:latest,STRIPE_SECRET_KEY=${_STRIPE_SECRET}:latest,STRIPE_WEBHOOK_SECRET=${_STRIPE_WEBHOOK}:latest,STRIPE_PUBLIC_KEY=${_STRIPE_PUBLIC}:latest,STRIPE_PRICE_TEAM=${_STRIPE_PRICE_TEAM}:latest,STRIPE_PRICE_BUSINESS=${_STRIPE_PRICE_BUSINESS}:latest"
      - "--set-env-vars"
      - "NEXTAUTH_URL=${_NEXTAUTH_URL},GOOGLE_CLOUD_PROJECT_ID=${PROJECT_ID},VERTEX_AI_LOCATION=${_VERTEX_LOCATION},GEMINI_ENABLED=true,GEMINI_FALLBACK=true,GEMINI_MODEL=${_GEMINI_MODEL},NEXT_PUBLIC_LOG_LEVEL=debug,LOG_LEVEL=info"
      - "--add-cloudsql-instances"
      - "${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--concurrency"
      - "80"
      - "--timeout"
      - "300"
      - "--max-instances"
      - "5"
      - "--min-instances"
      - "0"

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/${_DB_SECRET}/versions/latest
      env: DATABASE_URL

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_VERSION}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"

substitutions:
  _REGION: us-central1
  _REPO: alphalead-ai
  _SERVICE: alphalead
  _DB_INSTANCE: alphalead-db
  _DB_SECRET: database-url
  _AUTH_SECRET: nextauth-secret
  _STRIPE_SECRET: stripe-secret-key
  _STRIPE_WEBHOOK: stripe-webhook-secret
  _STRIPE_PUBLIC: stripe-public-key
  _STRIPE_PRICE_TEAM: stripe-price-team
  _STRIPE_PRICE_BUSINESS: stripe-price-business
  _NEXTAUTH_URL: https://alphalead.space
  _VERTEX_LOCATION: us-central1
  _GEMINI_MODEL: gemini-2.5-flash
  _VERSION: latest
  _SERVICE_ACCOUNT: cloud-run-alphalead-ai@alphalead-ai.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
  # Faster builder (8 vCPU + 8 GB) — Next.js build is CPU-bound. The default
  # Cloud Build machine (1 vCPU) makes `next build` several times slower.
  machineType: E2_HIGHCPU_8
  diskSizeGb: 200
